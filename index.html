    <!-- Hide loader when React app is ready -->
    <script>
      window.hideInitialLoader = function() {
        var l=document.getElementById('loader');
        if(l)l.classList.add('hidden');
      };
      // Fallback: гарантированно скрыть лоадер через 3 секунды
      setTimeout(function() {
        window.hideInitialLoader();
      }, 3000);
    </script>

<!-- Bitrix24 Chat Widget — deferred to not block mobile scroll -->
    <script>
      (function(w,d,u){
        function loadBitrix(){
          var s=d.createElement('script');s.async=true;s.src=u+'?'+(Date.now()/60000|0);
          var h=d.getElementsByTagName('script')[0];h.parentNode.insertBefore(s,h);
        }
        if('ontouchstart' in w || navigator.maxTouchPoints>0){
          w.addEventListener('load',function(){setTimeout(loadBitrix,5000);});
        }else{
          loadBitrix();
        }
      })(window,document,'https://cdn-ru.bitrix24.ru/b34562104/crm/site_button/loader_4_q4macf.js');
