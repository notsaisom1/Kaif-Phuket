# KAIF Nginx Security Configuration
# Поместите этот файл в /etc/nginx/sites-available/ или включите в основную конфигурацию

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    
    # SSL Configuration (замените на ваши сертификаты)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/private.key;
    
    root /var/www/kaif/public;
    index index.html;
    
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    
    # Блокируем доступ к .git папке
    location ~ /\.git {
        deny all;
        return 404;
    }
    
    # Блокируем доступ к node_modules
    location ~ /node_modules {
        deny all;
        return 404;
    }
    
    # Блокируем доступ к исходным файлам
    location ~ /src {
        deny all;
        return 404;
    }
    
    # Блокируем доступ к конфигурационным файлам
    location ~ \.(env|gitignore|htaccess|json|lock|md|txt|log|bak|backup|old|orig|tmp|temp|sql|sh|bat|cmd|jsx?|ts|tsx|vue|py|rb|php|asp|jsp|pl|cgi)$ {
        deny all;
        return 404;
    }
    
    # Блокируем доступ к скрытым файлам
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # Обслуживание статических файлов с кэшированием
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # SPA routing - все остальные запросы к index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Дополнительные security headers для HTML
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    
    # Rate limiting (опционально)
    # limit_req_zone $binary_remote_addr zone=main:10m rate=10r/s;
    # limit_req zone=main burst=20 nodelay;
    
    # Отключаем server tokens
    server_tokens off;
    
    # Максимальный размер загружаемых файлов
    client_max_body_size 10M;
} 